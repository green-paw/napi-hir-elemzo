name: Napi Hir Ellenorzes
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: # Így kézzel is elindíthatod a GitHubon

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Python beallitasa
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Fuggosegek telepitese
        run: pip install feedparser google-genai requests
      - name: Script futtatasa
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
