name: AI News Analysis with HTML Archive

on:
  schedule:
    - cron: '19 6,18 * * *'
  workflow_dispatch: # Manuális indítás lehetősége

permissions:
  contents: write  # Engedély az index.html visszamásolásához a repóba

jobs:
  analyze_and_save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser requests pyTelegramBotAPI pytz scikit-learn

      - name: Run AI News Agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push HTML Archive
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Csak az index.html-t adjuk hozzá
          if [ -f index.html ]; then
            git add index.html
            
            # Csak akkor commitolunk, ha tényleg változott a HTML
            if git diff --quiet && git diff --staged --quiet; then
              echo "Nincs változás a HTML fájlban."
            else
              git commit -m "Hírarchívum frissítése (HTML) [skip ci]"
              git push
            fi
          else
            echo "Hiba: Az index.html nem jött létre!"
          fi
